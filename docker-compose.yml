services:

  postgres:
    image: postgres:16-alpine
    container_name: tcai-postgres
    environment:
      POSTGRES_DB: transport_connect_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tcai-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: